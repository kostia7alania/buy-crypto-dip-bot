version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: dca-guard-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: dcaguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: local_password
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
