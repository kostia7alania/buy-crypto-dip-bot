# Production stack for the VPS. Lives at /opt/buy-crypto-dip-bot/docker-compose.yml
# together with a .env file (see .env.example + POSTGRES_PASSWORD).
# Deploys are: docker compose pull && docker compose up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dipbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No ports: reachable only from the docker network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dipbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/kostia7alania/buy-crypto-dip-bot:latest
    command: ["node", "apps/api/dist/server.js"]
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_CONNECTION_STRING: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/dipbot
      PORT: "8787"
    depends_on:
      db:
        condition: service_healthy
    # Localhost-only: nginx and debugging; never exposed to the internet.
    ports:
      - "127.0.0.1:8787:8787"

  bot:
    image: ghcr.io/kostia7alania/buy-crypto-dip-bot:latest
    command: ["node", "apps/bot/dist/index.js"]
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_CONNECTION_STRING: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/dipbot
      API_URL: http://api:8787
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ghcr.io/kostia7alania/buy-crypto-dip-bot:latest
    command: ["node", "apps/web/.output/server/index.mjs"]
    restart: unless-stopped
    env_file: .env
    environment:
      API_URL: http://api:8787
      NITRO_PORT: "3000"
      NITRO_HOST: 0.0.0.0
    depends_on:
      - api
    networks:
      - default
      - proxy
    # Traefik terminates 80/443 and discovers this service via labels —
    # no ports are published on the host.
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.services.dipbot.loadbalancer.server.port=3000
      # HTTPS router (Cloudflare -> :2053 via Origin Rule)
      - traefik.http.routers.dipbot.rule=Host(`buy-crypto-dip-bot.com`) || Host(`www.buy-crypto-dip-bot.com`)
      - traefik.http.routers.dipbot.entrypoints=websecure
      - traefik.http.routers.dipbot.tls.certresolver=le
      - traefik.http.routers.dipbot.middlewares=dipbot-www
      # Plain-HTTP router: keeps the site up while Cloudflare still reaches
      # the origin over :80 (before the 443->2053 Origin Rule is in place).
      - traefik.http.routers.dipbot-http.rule=Host(`buy-crypto-dip-bot.com`) || Host(`www.buy-crypto-dip-bot.com`)
      - traefik.http.routers.dipbot-http.entrypoints=web
      # www -> apex
      - traefik.http.middlewares.dipbot-www.redirectregex.regex=^https://www\.(.*)
      - traefik.http.middlewares.dipbot-www.redirectregex.replacement=https://$$1
      - traefik.http.middlewares.dipbot-www.redirectregex.permanent=true

volumes:
  pgdata:
    # Explicit name: survives compose project-dir renames and avoids
    # colliding with volumes from earlier deployment layouts.
    name: dipbot-pgdata

networks:
  # Shared edge network owned by the Traefik stack (infra/traefik on the VPS).
  # Every SaaS project on this box joins it and gets routing via labels.
  proxy:
    external: true
