# Production stack for the VPS. Lives at /opt/dca-guard/docker-compose.yml
# together with a .env file (see .env.example + POSTGRES_PASSWORD).
# Deploys are: docker compose pull && docker compose up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dcaguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No ports: reachable only from the docker network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dcaguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/kostia7alania/buy-crypto-dip-bot:latest
    command: ["node", "apps/api/dist/server.js"]
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_CONNECTION_STRING: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/dcaguard
      PORT: "8787"
    depends_on:
      db:
        condition: service_healthy
    # Localhost-only: nginx and debugging; never exposed to the internet.
    ports:
      - "127.0.0.1:8787:8787"

  bot:
    image: ghcr.io/kostia7alania/buy-crypto-dip-bot:latest
    command: ["node", "apps/bot/dist/index.js"]
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_CONNECTION_STRING: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/dcaguard
      API_URL: http://api:8787
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ghcr.io/kostia7alania/buy-crypto-dip-bot:latest
    command: ["node", "apps/web/.output/server/index.mjs"]
    restart: unless-stopped
    env_file: .env
    environment:
      API_URL: http://api:8787
      NITRO_PORT: "3000"
      NITRO_HOST: 0.0.0.0
    depends_on:
      - api
    # Localhost-only: nginx terminates 80/443 and proxies here.
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  pgdata:
