# Edge proxy for the whole VPS. Lives at /opt/traefik on the server.
# One-time: docker network create proxy && docker compose up -d
#
# Any project on this box gets a domain + automatic HTTPS by joining the
# external "proxy" network and adding traefik labels to its service —
# no changes here ever needed.

services:
  traefik:
    # v3.5 and older fail against the host's Docker Engine (min API 1.44)
    image: traefik:v3.7
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=proxy
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=kostia7alania@gmail.com
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --log.level=INFO
    ports:
      - "80:80"
      # Host port 443 is occupied by x-ui (user's VPN) — Traefik takes 2053,
      # one of Cloudflare's official alternative HTTPS ports. A CF Origin
      # Rule (incoming 443 -> origin 2053) completes the standard-port setup
      # without touching x-ui. Once/if x-ui moves off 443, change to 443:443
      # and enable the web->websecure redirect.
      - "2053:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - proxy

networks:
  proxy:
    external: true

volumes:
  letsencrypt:
