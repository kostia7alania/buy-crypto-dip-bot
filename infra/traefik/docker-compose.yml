# Edge proxy for the whole VPS. Lives at /opt/traefik on the server.
# One-time: docker network create proxy && docker compose up -d
#
# Any project on this box gets a domain + automatic HTTPS by joining the
# external "proxy" network and adding traefik labels to its service —
# no changes here ever needed.
#
# Port 443 is shared with the host's x-ui VPN via L4 SNI passthrough
# (see dynamic.yml): xray listens on 8443, Traefik tunnels non-web SNI to it.

services:
  traefik:
    # v3.5 and older fail against the host's Docker Engine (min API 1.44)
    image: traefik:v3.7
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=proxy
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=kostia7alania@gmail.com
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --log.level=INFO
    ports:
      - "80:80"
      - "443:443"
      # Cloudflare's alternative HTTPS port, kept as a fallback entry.
      - "2053:443"
    extra_hosts:
      # Lets the container reach xray on the host (8443).
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
      - letsencrypt:/letsencrypt
    networks:
      - proxy

networks:
  proxy:
    external: true

volumes:
  letsencrypt:
