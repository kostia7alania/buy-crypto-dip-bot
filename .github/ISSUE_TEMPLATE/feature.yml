name: Feature
body:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which bounded path should this change touch?
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety constraints
      description: Confirm no live trading, futures, leverage, withdrawals, or meme coins.
    validations:
      required: true
