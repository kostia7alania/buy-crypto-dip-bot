name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '26.4.0'
      - run: corepack enable
      - run: corepack use pnpm@latest-11
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm check
