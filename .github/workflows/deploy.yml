name: Deploy

# Build happens on GitHub runners (free & unlimited for public repos) and is
# pushed to GHCR. The 1GB VPS never builds anything — it only pulls the image.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Flip the repo variable DEPLOY_ENABLED to 'true' once the VPS secrets
    # (VPS_HOST, VPS_USER, VPS_PASSWORD) are configured.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd /opt/dca-guard
            docker compose pull
            docker compose up -d
            docker image prune -f
            docker compose ps
