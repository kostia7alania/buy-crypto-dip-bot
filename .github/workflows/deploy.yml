name: Deploy

# Build happens on GitHub runners (free & unlimited for public repos) and is
# pushed to GHCR. The 1GB VPS never builds anything — it only pulls the image.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Flip the repo variable DEPLOY_ENABLED to 'true' once the VPS secrets
    # (VPS_HOST, VPS_USER, VPS_SSH_KEY) are configured. Key-only auth —
    # passwords never travel through CI.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/buy-crypto-dip-bot
            # Sync the compose file from the repo so infra changes (image
            # tags, service commands, volume mounts) reach the server — the
            # pulled image alone can't carry them. Secrets stay in the local
            # .env, which the compose file references but never contains.
            curl -fsSL https://raw.githubusercontent.com/kostia7alania/buy-crypto-dip-bot/main/docker-compose.prod.yml -o docker-compose.yml
            docker compose pull
            docker compose up -d
            docker image prune -f
            docker compose ps
